name: PulseCI Monitor

on:
  push:
    branches: ["*"]
  pull_request:
    branches: ["*"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "18"

      - name: Install dependencies
        run: |
          if [ -f package.json ]; then npm install; else echo "No package.json found"; fi

      - name: Run tests
        run: |
          if [ -f package.json ] && grep -q "\"test\"" package.json; then npm test; else echo "No tests found"; fi

      - name: Build
        run: |
          if [ -f package.json ] && grep -q "\"build\"" package.json; then npm run build; else echo "No build script found"; fi
